name: Canvas Health

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: canvas-health-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  health:
    name: Typecheck + Focused Health Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run canvas health checks
        run: npm run check:health

  visual:
    name: Node Catalog Visual Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve browser executable
        id: browser
        shell: bash
        run: |
          set -euo pipefail
          for candidate in /usr/bin/google-chrome /usr/bin/google-chrome-stable /usr/bin/chromium /usr/bin/chromium-browser; do
            if [ -x "$candidate" ]; then
              echo "path=$candidate" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "No supported browser executable found on runner." >&2
          exit 1

      - name: Start Vite dev server
        shell: bash
        run: |
          set -euo pipefail
          nohup npm run dev -- --host 127.0.0.1 --port 5178 > /tmp/canvas-health-vite.log 2>&1 &
          echo $! > /tmp/canvas-health-vite.pid

      - name: Wait for dev server
        shell: bash
        run: |
          set -euo pipefail
          for attempt in {1..60}; do
            if curl -fsS http://127.0.0.1:5178/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Vite dev server did not become ready." >&2
          cat /tmp/canvas-health-vite.log >&2 || true
          exit 1

      - name: Run node catalog visual check
        env:
          PLAYWRIGHT_EXECUTABLE_PATH: ${{ steps.browser.outputs.path }}
        run: npm run test:visual -- --server http://127.0.0.1:5178

      - name: Print Vite log on failure
        if: failure()
        run: cat /tmp/canvas-health-vite.log || true

      - name: Stop Vite dev server
        if: always()
        shell: bash
        run: |
          if [ -f /tmp/canvas-health-vite.pid ]; then
            kill "$(cat /tmp/canvas-health-vite.pid)" || true
          fi
