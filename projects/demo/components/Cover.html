<!doctype html>
<html data-component="cover">
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 0;
        font: 16px/1.5 system-ui, sans-serif;
        color: #0f172a;
        background: transparent;
      }
      .cover {
        display: flex;
        flex-direction: column;
        gap: 16px;
        min-height: 480px;
        padding: 24px;
        border: 1px solid #dbe2ea;
        border-radius: 20px;
        background: white;
      }
      .cover-center {
        flex: 1;
        display: grid;
        place-items: center;
        text-align: center;
        color: #475569;
      }
      .cover-edge {
        color: #94a3b8;
      }
      h1 {
        margin: 0;
        font-size: 32px;
        line-height: 1.1;
      }
    </style>
  </head>
  <body>
    <div class="cover" data-slot="root" data-slot-kind="container">
      <div class="cover-edge" data-slot="top" data-slot-kind="container">
        <p>Top region</p>
      </div>
      <div class="cover-center" data-slot="center" data-slot-kind="container">
        <h1 data-slot="title" data-slot-kind="text">Cover</h1>
      </div>
      <div class="cover-edge" data-slot="bottom" data-slot-kind="container">
        <p>Bottom region</p>
      </div>
    </div>
  </body>
</html>
