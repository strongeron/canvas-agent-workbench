<!doctype html>
<html data-component="figure">
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 0;
        font: 16px/1.5 system-ui, sans-serif;
        color: #0f172a;
        background: transparent;
      }
      img,
      video,
      svg {
        max-width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body>
    <figure><svg viewBox="0 0 64 64" fill="none" aria-label="Figure"><rect x="8" y="10" width="48" height="44" rx="12" stroke="currentColor" stroke-width="3" /></svg><figcaption>Figure</figcaption></figure>
  </body>
</html>
